.ctrlval { color: #1a1916; font-size: 12px; font-weight: 600; }

.row:hover { background: #faf5ea; }

.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.btn-confirm { flex:1; padding:11px; background:#1a1916; color:#faf7f2; border:none; border-radius:8px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; }

// Heuristic multipliers
const HRM = [0.20,0.15,0.10,0.10,0.15,0.30,0.60,0.95,1.10,1.05,0.85,0.80,0.95,0.90,0.80,0.85,0.95,1.05,1.00,0.85,0.70,0.55,0.40,0.30];
const DM = { mon:1.05,tue:1.05,wed:1.05,thu:1.05,fri:1.10,sat:0.90,sun:0.80 };
const WD = {
  sunny:{cbd:1.0,bondi:1.3,scg:1.05,northern:1.25,chatswood:0.95,hills:0.95,west:0.95,south:1.0,southwest:0.95},

  rainy:{cbd:1.05,bondi:0.5,scg:0.75,northern:0.6,chatswood:1.0,hills:1.0,west:1.0,south:1.0,southwest:1.0}
};
const SCOL = { green:'#1a7f3a', yellow:'#c78200', red:'#c23434' };

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let state = { dest:'cbd', hour:11, day:'sat', weather:'sunny', event:false, premium:false, tick:0 };
let liveFacilities = {};  // keyed by facility_id
let dataSource = 'init';
let map, spotLayer, destMarker, currentBest;

// ═══════════════════════════════════════════════════════════════════════
// TFNSW CLIENT
// ═══════════════════════════════════════════════════════════════════════
async function fetchTfNSW(endpoint) {
  const attempts = [];
  if (TFNSW_API_KEY !== 'YOUR_KEY_HERE') {
    attempts.push({ url: `https://api.transport.nsw.gov.au/v1${endpoint}`, headers: { 'Authorization': `apikey ${TFNSW_API_KEY}` }, mode: 'direct' });
  }
  attempts.push({ url: `${PROXY_URL}${endpoint}`, headers: {}, mode: 'proxy' });
  for (const { url, headers, mode } of attempts) {
    try {
      const res = await fetch(url, { headers });
      if (!res.ok) continue;
      return { data: await res.json(), mode };
    } catch (e) { continue; }
  }
  throw new Error('All data sources unreachable');
}

async function refreshLiveData() {
  try {
    const ids = Object.keys(FACILITY_TO_TSN);
    const results = await Promise.all(ids.map(id => fetchTfNSW(`/carpark?facility=${id}`).catch(() => null)));
    liveFacilities = {};
    let mode = 'direct';
    results.forEach((r, i) => {
      if (r && r.data && r.data.location) {
        mode = r.mode;
        const id = ids[i];
        liveFacilities[id] = {
          tsn: FACILITY_TO_TSN[id],
          spots: parseInt(r.data.spots) || 0,
          occupied: parseInt(r.data.occupancy?.total) || 0,
          name: r.data.zones?.[0]?.zone_name || `Facility ${id}`,
          lat: parseFloat(r.data.location.latitude),
          lng: parseFloat(r.data.location.longitude),
          suburb: (r.data.location.suburb || '').trim(),
          address: r.data.location.address,
        };
      }
    });
    dataSource = mode === 'direct' ? 'live-direct' : 'live-proxy';
    const count = Object.keys(liveFacilities).length;
    if (count > 0) {
      updateBanner(`✓ TfNSW live · ${count}/${ids.length} facilities · via ${mode}`, 'ok');
    } else {
      updateBanner('✗ No facilities returned · check key / proxy · using mock', 'err');
    }
  } catch (e) {
    dataSource = 'mock-fallback';
    updateBanner('✗ TfNSW unreachable · start proxy.py · using mock', 'err');
    console.warn('TfNSW fetch failed:', e);
  }
}

function updateBanner(msg, kind) {
  const el = document.getElementById('dsbanner');
  el.textContent = msg;
  el.className = 'ds-banner' + (kind === 'err' ? ' err' : kind === 'warn' ? ' warn' : '');
  const live = document.getElementById('livestatus');
  live.className = 'live' + (kind === 'err' ? ' err' : '');
  live.innerHTML = `<span class="pulse"></span>${kind === 'err' ? 'mock' : 'live'}`;
}

// ═══════════════════════════════════════════════════════════════════════
// GEO HELPERS
// ═══════════════════════════════════════════════════════════════════════
function haversineKm(lat1, lng1, lat2, lng2) {
  const toRad = d => d * Math.PI / 180;
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// How far to walk from a P&R to the destination centre (rough — km × 12 min/km)
function estWalkMin(pnr, dest) {
  const km = haversineKm(pnr.lat, pnr.lng, dest.lat, dest.lng);
  if (km < 0.5) return Math.round(km * 15);      // very close
  if (km < 3)   return Math.round(km * 13 + 2);  // walkable
  return Math.round(km * 10 + 10);               // implied: train+walk
}

// ═══════════════════════════════════════════════════════════════════════
// SPOT ASSEMBLY
// ═══════════════════════════════════════════════════════════════════════
function buildSpotsForDestination(destId) {
  const dest = DESTS.find(d => d.id === destId);
  const spots = [];

  // 1. Real TfNSW facilities whose suburb matches this destination
  Object.entries(liveFacilities).forEach(([facId, live]) => {
    const pnr = PARKNRIDE_POIS.find(p => p.tsn === live.tsn);
    if (!pnr) return;

    // Include if matching suburb cluster, OR it's within 5km of destination
    const suburbMatch = dest.pnrSuburbs.includes(pnr.suburb);
    const dist = haversineKm(pnr.lat, pnr.lng, dest.lat, dest.lng);
    if (!suburbMatch && dist > 8) return;

    const walkMin = estWalkMin(pnr, dest);
    spots.push({
      id: `tfnsw-${facId}`,
      name: pnr.name,
      dest: destId,
      lat: pnr.lat,
      lng: pnr.lng,
      type: 'park-ride',
      capacity: live.spots,
      occupied: live.occupied,
      source: 'tracked',
      rate: 4,
      premiumRate: 3,
      walkMin,
      baselineBusy: 0.5,
      _live: true,
    });
  });

  // 2. Mock spots for this destination (commercial/street)
  MOCK_SPOTS.filter(s => s.dest === destId).forEach(s => spots.push({...s}));

  return spots;
}

function computeStatus(spot) {
  const dem = HRM[state.hour] * DM[state.day] * (WD[state.weather][spot.dest]||1) * (state.event && (spot.dest==='scg'||spot.dest==='cbd') ? 1.4 : 1);
  let avail, conf, lab, reason;

  if (spot._live && spot.capacity > 0) {
    const free = Math.max(0, spot.capacity - spot.occupied);
    avail = free / spot.capacity;
    conf = 0.95;
    lab = 'TfNSW live';
    reason = `${free} of ${spot.capacity} bays free right now (live from TfNSW Park&Ride API)`;
  } else if (spot.source === 'derived') {
    let occ = Math.min(0.99, Math.max(0.05, spot.baselineBusy * dem));
    const n = (Math.cos(hashStr(spot.id)*11 + state.hour*5)+1)/2 * 0.10;
    avail = Math.min(0.95, Math.max(0.05, (1 - occ) + n - 0.05));
    conf = 0.75;
    lab = 'ticket data';
    reason = `~${Math.round(avail*100)}% free based on active tickets`;
  } else {
    let occ = Math.min(0.99, Math.max(0.05, spot.baselineBusy * dem));
    avail = 1 - occ;
    conf = 0.5;
    lab = 'predicted';
    reason = `predicted ~${Math.round(avail*100)}% free for ${state.day} ${state.hour}:00`;
  }

  let st = 'yellow';
  if (avail >= 0.55) st = 'green';
  else if (avail <= 0.25) st = 'red';

  const busy = ((spot.baselineBusy || 0.5) * HRM[state.hour] * DM[state.day]) >= 0.75;
  const commute = Math.round(8 + spot.walkMin*0.5*(state.weather==='rainy'?1.2:1) + (state.event?6:0));

  return { ...spot, availability: avail, status: st, confidence: conf, sourceLabel: lab, busyFlag: busy, commuteMin: commute, reason };
}

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i); return Math.abs(h); }

function score(s) {
  const price = state.premium ? s.premiumRate : s.rate;
  return s.availability*100*0.35 + Math.max(0,100-s.commuteMin*2.5)*0.20 + Math.max(0,100-s.walkMin*5)*0.20 + Math.max(0,100-price*4)*0.15 + s.confidence*10 + (s.busyFlag?-8:0);
}

// ═══════════════════════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl:false }).setView([-33.8688, 151.2093], 11);
  L.control.zoom({ position:'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap © CARTO', maxZoom: 19 }).addTo(map);
  spotLayer = L.layerGroup().addTo(map);
}

function pinIcon(spot, isBest) {
  const col = SCOL[spot.status];
  let style = `background:${col};`;
  if (spot.confidence < 0.65) style = `background:transparent;border:2px solid ${col};`;
  else if (spot.confidence < 0.9) style = `background:${col};box-shadow:0 0 0 3px ${col}33;`;
  return L.divIcon({ className:'', html:`<div class="pinwrap"><div class="pin ${isBest?'best':''}" style="${style}"></div></div>`, iconSize:[28,28], iconAnchor:[14,14] });
}

function destIcon(d) {
  return L.divIcon({ className:'', html:`<div class="destpin">${d.icon}</div>`, iconSize:[36,36], iconAnchor:[18,18] });
}

function renderMap(spots, best) {
  spotLayer.clearLayers();
  const dest = DESTS.find(d => d.id === state.dest);
  if (destMarker) map.removeLayer(destMarker);
  destMarker = L.marker([dest.lat, dest.lng], { icon: destIcon(dest), zIndexOffset: 1000 }).addTo(map);
  destMarker.bindPopup(`<div class="popn">${dest.name}</div><div class="popd">your destination</div>`);
  spots.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: pinIcon(s, s.id === best.id), zIndexOffset: s.id === best.id ? 500 : 0 });
    const price = s.rate === 0 ? 'free' : `$${state.premium ? s.premiumRate : s.rate}/hr`;
    m.bindPopup(`<div class="popn">${s.name}</div><div class="popd">${Math.round(s.availability*100)}% free · ${s.walkMin}m walk · ${price}</div>`);
    m.addTo(spotLayer);
  });
  const bounds = L.latLngBounds([[dest.lat, dest.lng], ...spots.slice(0, 4).map(s => [s.lat, s.lng])]);
  if (bounds.isValid()) map.fitBounds(bounds, { padding: [60, 60], maxZoom: 14 });
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function render() {
  const raw = buildSpotsForDestination(state.dest);
  const spots = raw.map(computeStatus).map(s => ({...s, score: score(s)})).sort((a,b) => b.score - a.score);

  if (spots.length === 0) {
    document.getElementById('hero').innerHTML = '';
    document.getElementById('list').innerHTML = '<div class="loading">no spots loaded yet · waiting for TfNSW data...</div>';
    renderMap([], {id:''});
    return;
  }

  const best = spots[0];
  currentBest = best;
  const dest = DESTS.find(d => d.id === state.dest);
  const p = state.premium;
  const heroPrice = best.rate === 0 ? 'free' : `$${p ? best.premiumRate : best.rate}/hr`;
  const premSave = p && best.premiumRate < best.rate;

  document.getElementById('hero').innerHTML = `
    <div class="heroL">recommended · #1 of ${spots.length}</div>
    <div class="hero">
      <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:10px">
        <div>
          <div class="heroN">${best.name}</div>
          <div class="heroT">${(best.type||'').replace('-',' ')} · near ${dest.name}</div>
        </div>
        <div style="padding:5px 10px;border-radius:999px;background:${best.status==='green'?'#1e4a2a':best.status==='yellow'?'#4d3a10':'#4a1818'};color:${SCOL[best.status]};font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;height:fit-content">${best.status==='green'?'likely free':best.status==='yellow'?'maybe free':'likely full'}</div>
      </div>
      <div class="stats">
        <div><div class="stat-l">available</div><div class="stat-v">${Math.round(best.availability*100)}%</div><div class="stat-h">${best.sourceLabel}</div></div>
        <div><div class="stat-l">commute</div><div class="stat-v">${best.commuteMin}m</div><div class="stat-h">drive to spot</div></div>
        <div><div class="stat-l">walk</div><div class="stat-v">${best.walkMin}m</div><div class="stat-h">to destination</div></div>
        <div><div class="stat-l">price</div><div class="stat-v ${premSave?'prem':''}">${heroPrice}</div><div class="stat-h">${premSave?`save $${best.rate-best.premiumRate}/hr`:'hourly'}</div></div>
      </div>
      <div class="reason"><span class="reason-l">why:</span>${best.reason}${best.busyFlag?'<span class="busyf">⚠ usually busy</span>':''}</div>
      <button class="book" id="reserveBtn" onclick="openReserveModal(currentBest)">reserve a bay →</button>
    </div>`;

  document.getElementById('list').innerHTML = spots.map((s,i) => {
    const pr = state.premium ? s.premiumRate : s.rate;
    const oldpr = state.premium && s.premiumRate < s.rate ? `<span class="old">$${s.rate}</span>` : '';
    const priceHtml = s.rate === 0 ? '<span class="free">free</span>' : `${oldpr}<span class="${state.premium && s.premiumRate < s.rate ? 'prem-p':''}">$${pr}/hr</span>`;
    let dotStyle;
    if (s.confidence >= 0.9) dotStyle = `background:${SCOL[s.status]}`;
    else if (s.confidence >= 0.65) dotStyle = `background:${SCOL[s.status]};box-shadow:0 0 0 3px ${SCOL[s.status]}22`;
    else dotStyle = `background:transparent;border:2px solid ${SCOL[s.status]}`;
    return `<div class="row ${i===0?'best':''}" data-id="${s.id}">
      <div class="rank">${i+1}</div>
      <div class="dot" style="${dotStyle}"></div>
      <div>
        <div class="name">${s.name}${s.busyFlag?'<span class="bp">busy</span>':''}</div>
        <div class="detail">${Math.round(s.availability*100)}% free<span class="div">·</span>${s.commuteMin}m<span class="div">·</span>${s.walkMin}m walk<span class="div">·</span><span class="t-${s.source}">${s.sourceLabel}</span></div>
      </div>
      <div class="price">${priceHtml}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('.row').forEach(r => {
    r.onclick = () => {
      const id = r.dataset.id;
      const s = spots.find(x => x.id === id);
      map.setView([s.lat, s.lng], 16, { animate: true });
      spotLayer.eachLayer(l => { if (l.getLatLng && Math.abs(l.getLatLng().lat - s.lat) < 0.0001) l.openPopup(); });
    };
  });

  renderMap(spots, best);
}

function buildDests() {
  document.getElementById('destgrid').innerHTML = DESTS.map(d => {
    const rawSpots = buildSpotsForDestination(d.id);
    const tracked = rawSpots.filter(s => s._live).length;
    return `<button class="dest ${state.dest===d.id?'on':''}" data-id="${d.id}">${d.icon} ${d.name}<div class="c">${tracked > 0 ? `${tracked} live · ` : ''}${rawSpots.length} spots</div></button>`;
  }).join('');
  document.querySelectorAll('.dest').forEach(b => b.onclick = () => { state.dest = b.dataset.id; buildDests(); render(); });
}
function buildDays() {
  const days = ['mon','tue','wed','thu','fri','sat','sun'];
  document.getElementById('days').innerHTML = days.map(d => `<button class="chip ${state.day===d?'on':''}" data-d="${d}">${d}</button>`).join('');
  document.querySelectorAll('#days .chip').forEach(b => b.onclick = () => { state.day = b.dataset.d; buildDays(); render(); });
}
function buildWeather() {
  const opts = [['sunny','☀ sunny'],['cloudy','☁ cloudy'],['rainy','☂ rainy']];
  document.getElementById('weather').innerHTML = opts.map(([k,l]) => `<button class="chip ${state.weather===k?'on':''}" data-w="${k}">${l}</button>`).join('');
  document.querySelectorAll('#weather .chip').forEach(b => b.onclick = () => { state.weather = b.dataset.w; buildWeather(); render(); });
}
document.getElementById('hour').oninput = e => { state.hour = +e.target.value; document.getElementById('hourlbl').textContent = String(state.hour).padStart(2,'0')+':00'; render(); };
document.getElementById('event').onclick = e => { state.event = !state.event; e.target.classList.toggle('on'); render(); };
document.getElementById('premium').onclick = e => { state.premium = !state.premium; e.target.classList.toggle('on'); render(); };

(async function() {
  initMap();
  buildDays();
  buildWeather();
  buildDests();
  render();
  await refreshLiveData();
  buildDests();
  render();
  setInterval(async () => { await refreshLiveData(); state.tick++; buildDests(); render(); }, 60000);
  setInterval(() => { state.tick++; render(); }, 4000);
})();

// ── Reservation modal ──────────────────────────────────────────
const BACKEND = 'http://localhost:8788';

function openReserveModal(best) {
  const price = state.premium ? best.premiumRate : best.rate;
  const priceLabel = price === 0 ? 'Free' : `$${price}/hr`;
  const dest = DESTS.find(d => d.id === state.dest);

  document.getElementById('overlay').innerHTML = `
    <div class="modal" id="modalBox">
      <div class="modal-title">Reserve a bay</div>
      <div class="modal-sub">${best.name} · ${dest.name} · ${priceLabel}</div>
      <div class="modal-field">
        <label class="modal-label">your name</label>
        <input class="modal-input" id="m-name" placeholder="e.g. Alex Smith" autocomplete="off">
      </div>
      <div class="modal-field">
        <label class="modal-label">arrival time</label>
        <input class="modal-input" id="m-time" value="${String(state.hour).padStart(2,'0')}:00" readonly>
      </div>
      <div class="modal-field">
        <label class="modal-label">day</label>
        <input class="modal-input" id="m-day" value="${state.day.charAt(0).toUpperCase()+state.day.slice(1)}" readonly>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="m-cancel">Cancel</button>
        <button class="btn-confirm" id="m-confirm">Confirm booking →</button>
      </div>
    </div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('m-cancel').onclick = closeModal;
  document.getElementById('overlay').onclick = e => { if (e.target.id === 'overlay') closeModal(); };
  document.getElementById('m-confirm').onclick = () => submitBooking(best, dest, priceLabel);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

async function submitBooking(best, dest, priceLabel) {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }

  document.getElementById('m-confirm').textContent = 'Booking...';
  document.getElementById('m-confirm').disabled = true;

  try {
    const res = await fetch(`${BACKEND}/reserve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        spot_id: best.id,
        spot_name: best.name,
        dest: dest.name,
        name,
        hour: state.hour,
        price: priceLabel,
      }),
    });
    const booking = await res.json();
    showConfirmation(booking, best);
  } catch {
    // Backend not running — show a mock confirmation for demo
    const mockId = 'PKL-' + Math.random().toString(36).slice(2,8).toUpperCase();
    showConfirmation({ booking_id: mockId, name, spot_name: best.name }, best);
  }
}

function showConfirmation(booking, best) {
  document.getElementById('modalBox').innerHTML = `
    <div class="confirm-box">
      <div class="confirm-check">✓</div>
      <div class="modal-title">Bay reserved!</div>
      <div class="confirm-id">${booking.booking_id}</div>
      <div class="confirm-msg">
        <strong>${booking.name}</strong> · ${booking.spot_name}<br>
        Show this code at the parking attendant.
      </div>
      <div class="modal-actions" style="justify-content:center;margin-top:20px">
        <button class="btn-confirm" style="max-width:160px" onclick="closeModal()">Done</button>
      </div>
    </div>`;
}

</script>

<div class="overlay" id="overlay"></div>
</body>
</html>
